<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Home - Fashionista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- jQuery & Carousel -->
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

  <style>
    :root {
      --primary-pink: #ff69b4;
      --light-pink: #ffc0cb;
      --black: #111;
      --dark-gray: #1c1c1c;
      --white: #fff;
      --font-main: 'Montserrat', sans-serif;
      --font-heading: 'Playfair Display', serif;
    }

    body {
      margin: 0;
      background-color: var(--black);
      color: var(--white);
      font-family: var(--font-main);
    }

    nav {
      background-color: var(--dark-gray);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 15px;
      border-radius: 25px;
      transition: background-color 0.3s;
    }

    nav ul li a:hover,
    nav ul li a.active {
      background-color: var(--primary-pink);
      color: var(--black);
    }

    .hero {
      padding: 20px;
      background: #ffb6c1;
    }

    .owl-carousel .item img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      border-radius: 10px;
    }

    .search-filter {
      margin: 40px 30px 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .search-filter input[type="text"],
    .search-filter input[type="number"],
    .search-filter select {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 14px;
      width: 180px;
    }

    .container {
      padding: 0 30px 50px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      margin-top: 20px;
    }

    .row.card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: flex-start;
      margin-top: 20px;
    }
    .card {
      background: linear-gradient(135deg, #ffb6c1 0%, #ff69b4 100%);
      color: #222;
      border-radius: 15px;
      padding: 20px 16px 18px 16px;
      text-align: center;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(255, 105, 180, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 260px;
      min-height: 370px;
      max-width: 100%;
      margin-bottom: 20px;
    }
    .card h3, .card p {
      color: #222;
    }
    .card img {
      width: 100%;
      max-width: 210px;
      max-height: 210px;
      height: auto;
      object-fit: contain;
      background-color: #fff;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(255, 105, 180, 0.08);
    }
    @media (max-width: 900px) {
      .row.card-container {
        gap: 18px;
      }
      .card {
        width: 48%;
        min-width: 180px;
        padding: 14px 8px 12px 8px;
      }
    }
    @media (max-width: 600px) {
      .row.card-container {
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .card {
        width: 98%;
        min-width: 0;
        padding: 10px 4px 10px 4px;
      }
      .card img {
        max-width: 98vw;
        max-height: 160px;
      }
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.25);
    }

    .card h3 {
      font-family: var(--font-heading);
      font-size: 22px;
      color: var(--primary-pink);
    }

    .card p {
      font-size: 14px;
      color: #ccc;
    }

    .btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background-color: #111;
  color: #ff69b4; /* Make text pink */
  font-weight: bold;
  text-decoration: none;
  border-radius: 30px;
  transition: 0.3s;
  border: none;
  cursor: pointer;
}


    .btn:disabled, .btn[disabled] {
      background-color: #222 !important;
      color: #ff69b4 !important;
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn:hover:enabled {
      background-color: #ff69b4;
      color: #111;
    }

    h2.section-title {
      text-align: center;
      font-family: var(--font-heading);
      font-size: 32px;
      color: var(--light-pink);
      margin-top: 60px;
    }

    @media (max-width: 600px) {
      .search-filter input,
      .search-filter select {
        width: 100%;
      }
    }

    .card h3 {
      color: #1a1a1a !important;
      font-family: 'Playfair Display', serif;
      font-size: 2.1em;
      font-weight: 800;
      margin: 18px 0 8px 0;
    }
    .card p {
      color: #333 !important;
      font-size: 1.18em;
      font-weight: 600;
      margin: 8px 0 6px 0;
    }
    .card .btn {
  color: #ff69b4; /* Pink text */
  font-weight: 800;
  font-size: 1.1em;
  letter-spacing: 0.5px;
}

  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <ul>
      <li><a href="home.html" class="active"><i class="fas fa-home icon"></i>Home</a></li>
      <li><a href="cart.html"><i class="fas fa-shopping-cart icon"></i>Cart</a></li>
      <li><a href="orders.html"><i class="fas fa-box icon"></i>Orders</a></li>
      <li><a href="profile.html"><i class="fas fa-user icon"></i>Profile</a></li>
      <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt icon"></i>Logout</a></li>
    </ul>
  </nav>

  <!-- Carousel -->
  <section class="hero">
    <div class="owl-carousel owl-theme">
      <div class="item"><img src="/images/banner1.jpg" alt="Banner 1"></div>
      <div class="item"><img src="/images/banner2.jpg" alt="Banner 2"></div>
      <div class="item"><img src="/images/banner3.jpg" alt="Banner 3"></div>
    </div>
  </section>

  <!-- Search + Filter + Price Range -->
  <div class="container">
    <h2 class="section-title">Featured Collections</h2>
    <div class="search-filter">
      <input type="text" id="searchBox" placeholder="Search products..." />
      <select id="categoryFilter">
        <option value="">All Categories</option>
        <option value="dress">Dresses</option>
        <option value="jewelry">Jewelry</option>
        <option value="shoes">Shoes</option>
        <option value="bags">Bags</option>
        <option value="accessories">Accessories</option>
      </select>
      <input type="number" id="minPrice" placeholder="Min Price" min="0">
      <input type="number" id="maxPrice" placeholder="Max Price" min="0">
      <button id="searchBtn" class="btn">Search</button>
    </div>

    <div id="products" class="row card-container"></div>
  </div>

  <!-- Script -->
  <script>
    $(document).ready(function () {
      // Carousel
      $('.owl-carousel').owlCarousel({
        items: 1,
        loop: true,
        margin: 10,
        nav: false,
        autoplay: true,
        autoplayTimeout: 4000,
        autoplayHoverPause: true
      });

      // Logout
      $('#logoutBtn').click(function () {
        sessionStorage.clear();
        window.location.href = 'guest.html';
      });

      let allProducts = [];
      let filteredProducts = [];
      let currentPage = 1;
      const productsPerPage = 8;
      let loading = false;

      function filterProducts() {
        const search = $('#searchBox').val().trim().toLowerCase();
        const category = $('#categoryFilter').val();
        const minPrice = parseFloat($('#minPrice').val()) || 0;
        const maxPrice = parseFloat($('#maxPrice').val()) || Infinity;
        filteredProducts = allProducts.filter(item => {
          const title = (item.description || '').toLowerCase();
          const price = parseFloat(item.sell_price);
          const matchSearch = title.includes(search);
          const matchCategory = !category || (item.category && item.category === category);
          const matchPrice = price >= minPrice && price <= maxPrice;
          return matchSearch && matchCategory && matchPrice;
        });
        currentPage = 1;
        renderProducts();
      }

      function renderProducts() {
        const container = $('#products');
        container.html('');
        $('#pagination').remove();
        if (filteredProducts.length === 0) {
          container.html('<p style="color:#ff69b4;text-align:center;width:100%;">No products found.</p>');
          return;
        }
        // Pagination logic
        const totalPages = Math.ceil(filteredProducts.length / productsPerPage);
        if (currentPage > totalPages) currentPage = 1;
        const start = (currentPage - 1) * productsPerPage;
        const end = start + productsPerPage;
        const pageProducts = filteredProducts.slice(start, end);
        pageProducts.forEach(item => {
          container.append(`
            <div class="card" data-category="${item.category || ''}">
              <img src="/images/${item.product_image}" alt="${item.description}">
              <h3>${item.description}</h3>
              <p>${item.category ? item.category.charAt(0).toUpperCase() + item.category.slice(1) : ''}</p>
              <p>₱${item.sell_price}</p>
              <button class="btn add-to-cart" data-id="${item.item_id}" data-name="${item.description}" data-price="${item.sell_price}" data-image="/images/${item.product_image}">Add to Cart</button>
            </div>
          `);
        });
        // Pagination controls
        let paginationHtml = '<div id="pagination" style="text-align:center;margin-top:24px;">';
        for (let i = 1; i <= totalPages; i++) {
          paginationHtml += `<button class="btn" style="margin:0 4px;${i===currentPage?'background:#ff69b4;color:#fff;':''}" data-page="${i}">${i}</button>`;
        }
        paginationHtml += '</div>';
        if (totalPages > 1) {
          container.after(paginationHtml);
        }
      }

      function fetchAndRenderProducts() {
        fetch('http://localhost:3000/api/v1/items')
          .then(res => res.json())
          .then(data => {
            allProducts = data.rows || [];
            filteredProducts = allProducts;
            currentPage = 1;
            renderProducts();
          });
      }

      // Fetch on load
      fetchAndRenderProducts();

      // Event Listeners
      $('#searchBox, #categoryFilter, #minPrice, #maxPrice').on('input change', filterProducts);
      $('#searchBtn').on('click', function (e) {
        e.preventDefault();
        filterProducts();
      });

      // Pagination click
      $(document).on('click', '#pagination button', function() {
        currentPage = parseInt($(this).data('page'));
        renderProducts();
      });

      // Infinite scroll event: go to next page if available
      $(window).on('scroll', function() {
        if (loading) return;
        const totalPages = Math.ceil(filteredProducts.length / productsPerPage);
        if ($(window).scrollTop() + $(window).height() > $(document).height() - 120) {
          if (currentPage < totalPages) {
            loading = true;
            currentPage++;
            renderProducts();
            setTimeout(() => { loading = false; }, 400);
          }
        }
      });

      // Add to Cart
      $(document).on('click', '.add-to-cart', function () {
        const id = $(this).data('id');
        const name = $(this).data('name');
        const price = parseFloat($(this).data('price'));
        const image = $(this).data('image');
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let existing = cart.find(item => item.id == id);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({ id, name, price, image, quantity: 1 });
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        alert('Added to cart!');
      });
    });
  </script>

</body>
</html>
